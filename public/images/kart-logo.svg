<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#232F3E"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#FF9900" stroke-width="2.5"/>
  
  <!-- Kart body - simple go-kart from side view -->
  <path d="M25 62 L30 55 L70 55 L75 62 Z" fill="#FF9900"/>
  <rect x="28" y="55" width="44" height="4" rx="2" fill="#e68a00"/>
  
  <!-- Wheels -->
  <circle cx="33" cy="65" r="6" fill="#444"/>
  <circle cx="33" cy="65" r="3" fill="#888"/>
  <circle cx="67" cy="65" r="6" fill="#444"/>
  <circle cx="67" cy="65" r="3" fill="#888"/>
  
  <!-- Driver (simple helmet + visor) -->
  <ellipse cx="50" cy="44" rx="9" ry="10" fill="#FF9900"/>
  <ellipse cx="50" cy="42" rx="9" ry="8" fill="#e68a00"/>
  <rect x="42" y="41" width="16" height="5" rx="2.5" fill="#232F3E" opacity="0.9"/>
  
  <!-- Steering wheel hint -->
  <line x1="45" y1="53" x2="42" y2="56" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="53" x2="58" y2="56" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Speed lines -->
  <line x1="12" y1="54" x2="22" y2="54" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="8" y1="58" x2="20" y2="58" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="62" x2="21" y2="62" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Performance chart line (the SAR data nod) -->
  <polyline points="28,35 36,30 44,33 52,26 60,29 68,22 76,27" 
            fill="none" stroke="#00cc66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small dots on chart -->
  <circle cx="52" cy="26" r="1.5" fill="#00cc66"/>
  <circle cx="68" cy="22" r="1.5" fill="#00cc66"/>
</svg>
